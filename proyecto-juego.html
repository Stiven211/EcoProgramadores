<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Clasificación | EcoProgramadores STEAM MUTIS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .project-detail {
            padding: 100px 0 50px;
            background: linear-gradient(135deg, #064d15 0%, #003727 100%);
            min-height: 100vh;
        }

        .project-detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .project-detail-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .project-detail-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .project-detail-title {
            font-family: var(--font-primary);
            font-size: 2rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .project-detail-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .project-detail-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
        }

        .project-detail h3 {
            font-family: var(--font-primary);
            color: var(--color-primary-dark);
            margin: 1.5rem 0 1rem;
            font-size: 1.3rem;
        }

        .project-detail img {
            width: 100%;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--color-accent-turquoise);
            color: var(--color-primary-dark);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: var(--color-accent-neon);
            transform: scale(1.05);
        }
        
        .iframe-container {
            width: 100%;
            max-width: 485px;
            margin: 0 auto;
        }
        
        .iframe-container iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 485 / 402;
        }
    </style>
</head>

<body>
    <header id="header" class="header">
        <nav class="nav-container">
            <div class="nav-content">
                <div class="logo-section">
                    <div class="logo-circle">
                        <img src="logo/logo.jpg" alt="Logo EcoProgramadores">
                    </div>
                    <span class="logo-text">EcoProgramadores</span>
                </div>
                <a href="index.html#gallery" class="back-button">
                    ← Volver
                </a>
            </div>
        </nav>
    </header>

    <section class="project-detail">
        <div class="project-detail-container">

            <div class="project-detail-header">
                <div class="project-detail-icon">🎮</div>
                <h1 class="project-detail-title">Juego de Clasificación de Residuos</h1>
                <p class="project-detail-description">Juego interactivo para aprender a reciclar</p>
            </div>

            <div class="project-detail-content">
                <h3>🎮 Juego en Scratch</h3>
                <div class="iframe-container">
                    <p>Solo Cumputador</p>
                    <iframe src="https://scratch.mit.edu/projects/1280207905/embed" allowtransparency="true" width="485"
                            height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>
                </div>

                <h3>📸 Proceso de Creación</h3>
                <img src="Ecoprogramadores/Juego de clasificación de residuos/Proceso del juego/WhatsApp Image 2025-10-25 at 4.52.12 PM.jpeg"
                    alt="Juego 1">
                <img src="Ecoprogramadores/Juego de clasificación de residuos/Proceso del juego/WhatsApp Image 2025-10-25 at 4.52.12 PM (1).jpeg"
                    alt="Juego 2">
                <img src="Ecoprogramadores/Juego de clasificación de residuos/Proceso del juego/WhatsApp Image 2025-10-25 at 4.52.12 PM (2).jpeg"
                    alt="Juego 3">
                <img src="Ecoprogramadores/Juego de clasificación de residuos/Proceso del juego/WhatsApp Image 2025-10-25 at 4.52.13 PM.jpeg"
                    alt="Juego 4">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
